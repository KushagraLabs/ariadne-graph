<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ariadne — code graph</title>
<script src="/graph/d3.min.js"></script>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --ink: #e6e9ef; --muted: #8b94a7;
    --line: #262b36; --accent: #6ea8fe;
    --ok: #3fb27f; --info: #6ea8fe; --warn: #e0a44a; --error: #e05a5a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #app { display: grid; grid-template-columns: 1fr 320px; grid-template-rows: auto 1fr; height: 100%; }
  header { grid-column: 1 / 3; display: flex; gap: 12px; align-items: center;
    padding: 10px 14px; border-bottom: 1px solid var(--line); background: var(--panel); }
  header h1 { font-size: 15px; margin: 0 8px 0 0; font-weight: 600; }
  select, button { background: #10131a; color: var(--ink); border: 1px solid var(--line);
    border-radius: 6px; padding: 5px 9px; font-size: 13px; }
  button { cursor: pointer; } button:hover { border-color: var(--accent); }
  #crumbs { color: var(--muted); font-size: 13px; }
  #crumbs a { color: var(--accent); cursor: pointer; text-decoration: none; }
  #stage { position: relative; width: 100%; height: 100%; overflow: hidden; }
  #graph { width: 100%; height: 100%; display: block; cursor: grab; }
  #graph:active { cursor: grabbing; }
  #side { border-left: 1px solid var(--line); background: var(--panel); padding: 14px; overflow-y: auto; }
  #side h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em;
    color: var(--muted); margin: 0 0 8px; }
  .legend div { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .sel-title { font-weight: 600; margin: 14px 0 4px; word-break: break-all; }
  .stat { color: var(--muted); font-size: 13px; }
  #note { color: var(--warn); font-size: 12px; margin-top: 10px; }
  #empty { color: var(--muted); padding: 30px; position: absolute; }
  .node-label { fill: #c7ccd6; font-size: 10px; pointer-events: none; }
  .node-initials { fill: #fff; font-weight: 600; pointer-events: none; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Ariadne</h1>
    <select id="repo"></select>
    <span id="crumbs"></span>
    <span style="flex:1"></span>
    <button id="mode" title="Rigid shows the ideal clean structure; Soft lets coupling distort it to reveal incoherence">Soft coupling</button>
    <button id="labels" title="Show or hide file name labels">Names: auto</button>
    <button id="reset">Reset view</button>
  </header>
  <div id="stage"><svg id="graph"></svg></div>
  <aside id="side">
    <h2>Hygiene legend</h2>
    <div class="legend">
      <div><span class="dot" style="background:var(--ok)"></span> clean</div>
      <div><span class="dot" style="background:var(--info)"></span> info</div>
      <div><span class="dot" style="background:var(--warn)"></span> warning</div>
      <div><span class="dot" style="background:var(--error)"></span> error</div>
    </div>
    <div class="legend" id="edge-legend">
      <div><span class="dot" style="width:16px;height:3px;border-radius:1px;background:#5b6b8f"></span> import (downward, ok)</div>
      <div><span class="dot" style="width:16px;height:3px;border-radius:1px;background:#f7768e"></span> layering violation</div>
    </div>
    <p class="stat" style="margin-top:10px">Node color = top-level module; ring = hygiene.
      Red edges import outside their own subtree (up/cross) — each must justify its cost.
      Drag to rearrange; hover an edge to trace it.</p>
    <div id="detail"></div>
    <div id="note"></div>
  </aside>
</div>
<script>
const LEVEL_COLOR = { error: "#e05a5a", warning: "#e0a44a", info: "#6ea8fe", null: "#3fb27f" };
// Categorical hues for directory groups — jewel-toned so distinct on dark bg
// without turning neon. Files inherit their directory's hue; hygiene rides as a
// thin ring so both "which module" and "how healthy" read at once.
const DIR_PALETTE = [
  "#7aa2f7", "#bb9af7", "#7dcfff", "#9ece6a", "#e0af68", "#f7768e",
  "#2ac3de", "#c0caf5", "#ff9e64", "#41a6b5", "#b4f9f8", "#e69ac0",
  "#89ddff", "#a6da95", "#eed49f", "#f5a97f", "#8aadf4", "#c6a0f6",
];
const _dirColor = new Map();
function dirColor(dir) {
  if (!_dirColor.has(dir))
    _dirColor.set(dir, DIR_PALETTE[_dirColor.size % DIR_PALETTE.length]);
  return _dirColor.get(dir);
}
// File path relative to the open folder, e.g. "organs/knowledge/svc.py".
function relOf(filePath, repoRoot, folder) {
  const base = `${repoRoot.replace(/\/$/, "")}/${folder}/`;
  return filePath.startsWith(base) ? filePath.slice(base.length)
       : filePath.startsWith(`${folder}/`) ? filePath.slice(folder.length + 1)
       : filePath;
}
// Directory portion of a relative path ("organs/knowledge/svc.py" → "organs/knowledge");
// a file directly under the folder root → "" (the synthetic root dir).
function dirOf(rel) {
  const i = rel.lastIndexOf("/");
  return i > 0 ? rel.slice(0, i) : "";
}
// Parent directory id ("organs/knowledge" → "organs"; "organs" → ""; "" → null root).
function parentDir(dir) {
  if (dir === "") return null;
  const i = dir.lastIndexOf("/");
  return i > 0 ? dir.slice(0, i) : "";
}
// Layering rule: an import A→B is ALLOWED iff B's dir is A's dir or a descendant
// of it (compose lower/same). Ancestors, cousins, other branches = VIOLATION
// ("import only from your own subtree; upward/cross coupling must justify cost").
function isViolation(dirA, dirB) {
  if (dirA === dirB) return false;
  const prefix = dirA === "" ? "" : dirA + "/";
  return !dirB.startsWith(prefix);  // B not inside A's subtree
}

// Hierarchical (tree) distance between two directory paths = steps from each up
// to their lowest common ancestor, summed. Same dir → 0; sibling files' dirs
// differ only in the last segment → 2; cross-organ → large. Drives coupling
// force falloff: pull ∝ 1/(1+dist)² so distant (cross-tree) couplings pull
// weakly and settle FAR, keeping organs from balling into the center.
function treeDistance(dirA, dirB) {
  if (dirA === dirB) return 0;
  const a = dirA === "" ? [] : dirA.split("/");
  const b = dirB === "" ? [] : dirB.split("/");
  let i = 0;
  while (i < a.length && i < b.length && a[i] === b[i]) i++;
  return (a.length - i) + (b.length - i);  // steps up from A + steps up from B
}

const state = { graph: null, repoRoot: null, folder: null, subpath: "",
                fileData: null, sim: null, mode: "soft",      // "soft" | "rigid"
                labelMode: "auto" };                          // "auto" | "on" | "off"

function colorFor(worst) { return LEVEL_COLOR[worst] || "#3fb27f"; }
function sizeFor(count) { return 10 + Math.min(24, Math.sqrt(count || 0) * 3.5); }

async function j(url) { const r = await fetch(url); if (!r.ok) throw new Error(await r.text()); return r.json(); }

// ---- D3 force graph (live simulation; matches Lumen_Ai's KG tab feel) --------
const svg = d3.select("#graph");
let gRoot = null;  // zoom/pan container

function stageSize() {
  const s = document.getElementById("stage");
  return { w: s.clientWidth, h: s.clientHeight };
}

function ensureDefs() {
  // One-time <defs>: gradients per hygiene level, drop shadow, arrowhead.
  if (svg.select("defs").size()) return;
  const defs = svg.append("defs");
  Object.entries(LEVEL_COLOR).forEach(([k, c]) => {
    const grad = defs.append("radialGradient").attr("id", "grad-" + k)
      .attr("cx", "35%").attr("cy", "35%").attr("r", "65%");
    grad.append("stop").attr("offset", "0%").attr("stop-color", d3.rgb(c).brighter(0.9));
    grad.append("stop").attr("offset", "100%").attr("stop-color", c);
  });
  const sh = defs.append("filter").attr("id", "nshadow")
    .attr("x", "-50%").attr("y", "-50%").attr("width", "200%").attr("height", "200%");
  sh.append("feDropShadow").attr("dx", 0).attr("dy", 1).attr("stdDeviation", 2)
    .attr("flood-color", "#000").attr("flood-opacity", 0.45);
  defs.append("marker").attr("id", "arrow").attr("viewBox", "0 -5 10 10")
    .attr("refX", 18).attr("refY", 0).attr("markerWidth", 6).attr("markerHeight", 6)
    .attr("orient", "auto").append("path").attr("d", "M0,-5L10,0L0,5").attr("fill", "#4a5570");
}

function render(nodes, links) {
  if (state.sim) { state.sim.stop(); state.sim = null; }
  svg.selectAll("*").remove();
  const empty = document.getElementById("empty");
  if (empty) empty.remove();
  ensureDefs();

  const n = nodes.length;
  // Label visibility: "auto" hides file labels on dense graphs (>200) to avoid
  // collision (reveal on hover/zoom); "on" forces all; "off" hides all files.
  // Directory-hub labels always show (they name the modules).
  const denseLabels = state.labelMode === "off" ? true
                    : state.labelMode === "on" ? false
                    : n > 200;

  const { w, h } = stageSize();
  gRoot = svg.append("g");
  let labelsForced = false;
  const LABEL_ZOOM = 1.8;  // zoomed in past this → reveal all labels even when dense
  const zoom = d3.zoom().scaleExtent([0.05, 4]).on("zoom", (e) => {
    gRoot.attr("transform", e.transform);
    const shouldForce = e.transform.k >= LABEL_ZOOM;
    if (denseLabels && shouldForce !== labelsForced) {
      labelsForced = shouldForce;
      gRoot.selectAll(".node-label").style("display", labelsForced ? null : "none");
    }
  });
  svg.call(zoom);
  state.zoom = zoom;  // Reset-view + auto-fit use this to reframe.

  // Fit all nodes into view (with padding). Called once the sim settles so the
  // whole arrangement is visible instead of landing zoomed into one cluster.
  function fitView(dur = 500) {
    const xs = nodes.map(d => d.x), ys = nodes.map(d => d.y);
    if (!xs.length || xs.some(v => v == null)) return;
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const gw = maxX - minX || 1, gh = maxY - minY || 1;
    const pad = 80;
    const k = Math.min((w - pad) / gw, (h - pad) / gh, 2);
    const tx = w / 2 - k * (minX + maxX) / 2;
    const ty = h / 2 - k * (minY + maxY) / 2;
    svg.transition().duration(dur).call(zoom.transform,
      d3.zoomIdentity.translate(tx, ty).scale(k));
  }
  state.fitView = fitView;

  const hasHubs = nodes.some(d => d.kind === "dir");
  const charge = n > 200 ? -70 : n > 50 ? -200 : -340;

  let sim;
  if (hasHubs) {
    // Radial "outward-drive" layout: every node is pushed OUTWARD from the center
    // to a ring set by its depth (root pinned center, top dirs inner ring, files
    // at the rim) — nodes "want to fly out", held back only by their relations.
    // Tree springs keep children in their parent's wedge; dependency edges (weak)
    // pull coupled nodes together, bending the rings inward where real coupling
    // lives — so tight modules knot up and cross-tree imports visibly drag nodes
    // out of place. No center gravity; the radial force replaces it.
    const cx = w / 2, cy = h / 2;
    const ring = Math.max(70, Math.min(w, h) / 9);   // px between depth rings
    const maxDepth = Math.max(1, ...nodes.map(d => d.depth || 0));
    const rigid = state.mode === "rigid";
    const byId = new Map(nodes.map(d => [d.id, d]));

    // Pin the synthetic root at dead center so the whole tree hangs off it.
    const root = nodes.find(d => d.kind === "dir" && d.depth === 0);
    if (root) { root.fx = cx; root.fy = cy; }

    // SHELL placement: give every file a stable angle around its hub so siblings
    // sit on one equidistant arc (a directory reads as a coherent petal-shell).
    // Group files by their hub, then fan them across an angular slice.
    const filesByHub = new Map();
    nodes.forEach(d => { if (d.kind === "file") {
      const h = "dir:" + d.dir; (filesByHub.get(h) || filesByHub.set(h, []).get(h)).push(d);
    }});
    filesByHub.forEach(arr => arr.forEach((d, k) => {
      d.shellAngle = (k + 0.5) / arr.length * 2 * Math.PI;   // even spread
      d.shellR = ring * 0.7;                                  // files ride just outside their hub
    }));
    // Seed positions on depth rings (golden-angle) so it starts unfolded.
    nodes.forEach((d, i) => {
      if (d.fx != null) return;
      const a = (i * 2.399963);
      const r = (d.depth || 0) * ring;
      d.x = cx + r * Math.cos(a); d.y = cy + r * Math.sin(a);
    });

    const tgtKind = d => (typeof d.target === "object" ? d.target.kind : null);
    sim = d3.forceSimulation(nodes)
      // Tree spring: stiff & short — files hug their hub, dirs hug their parent.
      .force("link", d3.forceLink(links).id(d => d.id)
        .distance(d => d.kind === "hub" ? (tgtKind(d) === "file" ? ring * 0.7 : 40) : 70)
        // KEY: dependency pull ∝ 1/(1+treeDistance)² — same-dir couples pull hard,
        // cross-organ couples pull ~weakly so they settle FAR (no ball-up). In
        // rigid mode coupling contributes NO positioning force (edges only).
        .strength(d => d.kind === "hub" ? 0.9
          : rigid ? 0 : 0.9 / Math.pow(1 + (d.dist || 0), 2)))
      // Repulsion spreads siblings; hubs push harder to claim separate wedges.
      .force("charge", d3.forceManyBody().strength(d =>
        d.kind === "dir" ? -240 - 900 / (d.depth || 1) : -16).distanceMax(700))
      .force("collision", d3.forceCollide().radius(d => d.size + (d.kind === "dir" ? 10 : 2.5)))
      // Outward drive: dirs pulled to their depth ring (firm → crisp hierarchy).
      .force("radial", d3.forceRadial(d => (d.depth || 0) * ring, cx, cy)
        .strength(d => d.kind === "dir" ? 0.5 + 0.35 * ((d.depth || 1) / maxDepth) : 0))
      // SHELL force: place each file at its hub's position + (shellR, shellAngle).
      // Rigid → strong (files locked on a clean arc). Soft → gentler, so LCA-
      // weighted coupling can bulge a file off-shell = visible incoherence cue.
      .force("shellX", d3.forceX(d => {
        if (d.kind !== "file") return cx;
        const h = byId.get("dir:" + d.dir); if (!h) return cx;
        return (h.x ?? cx) + d.shellR * Math.cos(d.shellAngle);
      }).strength(d => d.kind === "file" ? (rigid ? 0.9 : 0.5) : 0))
      .force("shellY", d3.forceY(d => {
        if (d.kind !== "file") return cy;
        const h = byId.get("dir:" + d.dir); if (!h) return cy;
        return (h.y ?? cy) + d.shellR * Math.sin(d.shellAngle);
      }).strength(d => d.kind === "file" ? (rigid ? 0.9 : 0.5) : 0));
  } else {
    // Flat force layout for the folder (top-level) view.
    const linkDist = n > 50 ? 70 : 110;
    sim = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(d => d.id).distance(linkDist))
      .force("charge", d3.forceManyBody().strength(charge))
      .force("center", d3.forceCenter(w / 2, h / 2))
      .force("collision", d3.forceCollide().radius(d => d.size + 5));
  }
  state.sim = sim;

  // Draw order (bottom→top): hub spokes, allowed deps, then VIOLATION deps on
  // top so layering violations (upward/cross-tree imports) are the loudest thing.
  const rank = d => d.kind === "hub" ? 0 : d.violation ? 2 : 1;
  const ordered = links.slice().sort((a, b) => rank(a) - rank(b));
  const DEP_OK = "#5b6b8f", VIOL = "#f7768e";
  const link = gRoot.append("g").selectAll("line").data(ordered).enter().append("line")
    .attr("stroke", d => d.kind === "hub" ? "#2c3444" : d.violation ? VIOL : DEP_OK)
    .attr("stroke-opacity", d => d.kind === "hub" ? 0.3 : d.violation ? 0.85 : 0.5)
    .attr("stroke-width", d => d.kind === "hub" ? 0.6
      : (d.violation ? 1.5 : 1) * Math.min(5, 1 + Math.log2((d.weight || 1) + 1)))
    .attr("marker-end", d => d.kind === "hub" ? null : "url(#arrow)")
    .style("pointer-events", d => d.kind === "hub" ? "none" : null)
    .on("mouseenter", function (e, d) { if (d.kind !== "hub") d3.select(this).transition().duration(150)
      .attr("stroke-opacity", 1).attr("stroke", d.violation ? "#ff9eae" : "#89b4fa"); })
    .on("mouseleave", function (e, d) { if (d.kind !== "hub") d3.select(this).transition().duration(150)
      .attr("stroke-opacity", d.violation ? 0.85 : 0.5).attr("stroke", d.violation ? VIOL : DEP_OK); });

  const node = gRoot.append("g").selectAll("g").data(nodes).enter().append("g")
    .style("cursor", "pointer")
    .call(d3.drag().on("start", dragStart).on("drag", dragMove).on("end", dragEnd));

  // Fill = directory hue (or hygiene gradient in the folder view where there are
  // no dir hubs); a thin hygiene-colored ring carries the health signal on top.
  node.append("circle")
    .attr("r", d => d.size)
    .attr("fill", d => hasHubs ? d.color : `url(#grad-${d.worst || "null"})`)
    .attr("fill-opacity", d => d.kind === "file" ? 0.92 : 1)
    .attr("stroke", d => hasHubs ? colorFor(d.worst) : "#0b0d11")
    .attr("stroke-width", d => d.kind === "dir" ? 3 : hasHubs ? 2 : 1.5)
    .attr("filter", "url(#nshadow)")
    .on("click", (e, d) => {
      showDetail(d);
      if (d.kind === "folder") showFiles(d.label);           // top level → into a folder
      else if (d.kind === "dir" && d.canDrill) drillTo(d.drillTo);  // dir hub → descend
    })
    .on("mouseenter", function (e, d) {
      d3.select(this).transition().duration(150)
        .attr("r", d.size + 4).attr("stroke", "#c7d2fe").attr("stroke-width", d.kind === "dir" ? 4 : 3);
      d3.select(this.parentNode).select(".node-label").style("display", null);
    })
    .on("mouseleave", function (e, d) {
      d3.select(this).transition().duration(150)
        .attr("r", d.size).attr("stroke", hasHubs ? colorFor(d.worst) : "#0b0d11")
        .attr("stroke-width", d.kind === "dir" ? 3 : hasHubs ? 2 : 1.5);
      if (denseLabels && !labelsForced && d.kind !== "dir")
        d3.select(this.parentNode).select(".node-label").style("display", "none");
    });

  // Drillable dir hubs (collapsed subtree) get a dashed outer ring cueing "click
  // to descend" — the visible affordance for progressive disclosure.
  node.filter(d => d.kind === "dir" && d.canDrill).append("circle")
    .attr("r", d => d.size + 5).attr("fill", "none")
    .attr("stroke", d => d.color).attr("stroke-width", 1.5)
    .attr("stroke-dasharray", "3 3").attr("stroke-opacity", 0.8)
    .style("pointer-events", "none");

  // initials inside file/folder nodes; dir hubs get no initials (labelled below).
  node.filter(d => d.kind !== "dir").append("text").attr("class", "node-initials")
    .attr("dy", ".35em").attr("text-anchor", "middle")
    .attr("font-size", d => Math.max(8, d.size * 0.7)).attr("fill", "#0b0d11")
    .attr("font-weight", 700)
    .text(d => (d.label || "").substring(0, 3).toUpperCase());
  // full label below. Dir hubs ALWAYS show their name (the "department"); file
  // labels follow the dense rule (hidden when crowded, shown on hover/zoom).
  node.append("text").attr("class", "node-label").attr("text-anchor", "middle")
    .attr("dy", d => d.size + 12)
    .attr("font-size", d => d.kind === "dir" ? 13 : 10)
    .attr("font-weight", d => d.kind === "dir" ? 700 : 400)
    .attr("fill", d => d.kind === "dir" ? d.color : "#c7ccd6")
    .text(d => d.label)
    .style("display", d => (denseLabels && d.kind !== "dir") ? "none" : null);
  // native tooltip; textContent-safe (d.label from disk file names)
  node.append("title").text(d => d.kind === "folder"
    ? `${d.label}\n${d.file_count} files · ${d.diag || 0} diagnostics`
    : d.kind === "dir"
    ? `${d.label}/\n${d.file_count} files`
    : `${d.path || d.label}\n${d.dir ? d.dir + "/ · " : ""}${d.diag || 0} diagnostics${d.worst ? " · worst: " + d.worst : ""}`);

  sim.on("tick", () => {
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  });
  // Frame the whole arrangement once the layout has taken shape. Large graphs
  // decay alpha slowly, so "end" is unreliable — fit on a fixed settle timer
  // (scaled to node count), which is deterministic. The user can re-fit anytime
  // via Reset view.
  clearTimeout(state.fitTimer);
  state.fitTimer = setTimeout(() => fitView(700), n > 400 ? 4500 : n > 50 ? 2000 : 900);

  function dragStart(e, d) { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
  function dragMove(e, d) { d.fx = e.x; d.fy = e.y; }
  function dragEnd(e, d) { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }
}

// ---- data loading + drill-down (unchanged API contract) ----------------------
async function loadRepos() {
  const { repos } = await j("/api/graph/repos");
  const sel = document.getElementById("repo");
  sel.innerHTML = "";
  repos.filter(r => r.file_count > 0).forEach(r => {
    const o = document.createElement("option");
    o.value = r.graph_id; o.dataset.root = r.repo_root;
    o.textContent = `${r.repo_root.split("/").pop() || r.repo_root} (${r.file_count} files)`;
    sel.appendChild(o);
  });
  sel.onchange = () => selectRepo(sel.value, sel.selectedOptions[0].dataset.root);
  if (sel.options.length) selectRepo(sel.value, sel.selectedOptions[0].dataset.root);
  else showEmpty("No indexed repos with data.");
}

async function selectRepo(graph, root) {
  state.graph = graph; state.repoRoot = root; state.folder = null;
  await showFolders();
}

async function showFolders() {
  state.folder = null;
  crumbs();
  const { folders, edges } = await j(`/api/graph/folders?graph=${state.graph}&repo_root=${encodeURIComponent(state.repoRoot)}`);
  const ids = new Set(folders.map(f => "folder:" + f.folder));
  const nodes = folders.map(f => ({
    id: "folder:" + f.folder, label: f.folder, kind: "folder",
    worst: f.worst_level, size: sizeFor(f.diagnostic_count),
    file_count: f.file_count, diag: f.diagnostic_count }));
  const links = (edges || [])
    .filter(e => ids.has("folder:" + e.source) && ids.has("folder:" + e.target))
    .map(e => ({ source: "folder:" + e.source, target: "folder:" + e.target, weight: e.weight }));
  render(nodes, links);
  document.getElementById("note").textContent = "";
}

// How many directory levels below the current scope to expand at once. Deeper
// dirs collapse into a hub you click to descend — keeps every view readable.
const MAX_DEPTH = 2;

// Fetch a folder's files once, cache, then render scoped to the folder root.
async function showFiles(folder) {
  state.folder = folder;
  state.subpath = "";
  const data = await j(`/api/graph/files?graph=${state.graph}&repo_root=${encodeURIComponent(state.repoRoot)}&folder=${encodeURIComponent(folder)}`);
  state.fileData = data;
  renderScope();
}

// Descend into / jump to a sub-directory within the current folder.
function drillTo(subpath) {
  state.subpath = subpath;
  renderScope();
}

// Build the radial view for the current (folder, subpath) scope. Files outside
// the scope are excluded; dirs deeper than MAX_DEPTH collapse into a clickable
// hub. Depths/violations are computed RELATIVE to the scope root.
function renderScope() {
  crumbs();
  const { folder, subpath, fileData: data } = state;
  const scope = subpath ? `${folder}/${subpath}` : folder;   // path we're rooted at
  const scopePrefix = subpath ? subpath + "/" : "";

  // relPath within the SCOPE (organs/knowledge/db/pg.py, scoped at organs → knowledge/db/pg.py)
  const inScope = [];
  for (const f of data.files) {
    const rel = relOf(f.file_path, state.repoRoot, folder);
    if (subpath && !rel.startsWith(scopePrefix)) continue;   // outside the drilled subtree
    inScope.push({ f, srel: subpath ? rel.slice(scopePrefix.length) : rel });
  }

  const fileDir = new Map();          // file id → full dir (for violation test, absolute within folder)
  const dirFileCount = new Map();     // collapsed dir (relative, ≤MAX_DEPTH) → direct file count
  const allDirs = new Set([""]);
  const collapsedInto = new Map();    // file id → the (possibly collapsed) dir hub it hangs from

  const fileNodes = inScope.map(({ f, srel }) => {
    const fullDir = dirOf(relOf(f.file_path, state.repoRoot, folder));  // absolute-in-folder, for isViolation
    fileDir.set(f.id, fullDir);
    const relDir = dirOf(srel);                     // dir relative to scope
    // Collapse anything deeper than MAX_DEPTH into its MAX_DEPTH-level ancestor.
    const segs = relDir === "" ? [] : relDir.split("/");
    const shown = segs.slice(0, MAX_DEPTH).join("/");
    dirFileCount.set(shown, (dirFileCount.get(shown) || 0) + 1);
    for (let d = shown; d !== null; d = parentDir(d)) allDirs.add(d);
    collapsedInto.set(f.id, shown);
    const branch = srel.indexOf("/") > 0 ? srel.slice(0, srel.indexOf("/")) : "(root)";
    const depth = (shown === "" ? 0 : shown.split("/").length) + 1;
    return { id: f.id, label: f.name, kind: "file", path: f.file_path,
             dir: shown, branch, depth, color: dirColor(scope + "/" + branch),
             worst: f.worst_level, size: sizeFor(f.diagnostic_count), diag: f.diagnostic_count };
  });

  // Subtree file counts for hub sizing + "is this hub collapsible?" (has deeper dirs).
  const subtreeCount = new Map();
  for (const dir of allDirs) {
    let c = 0;
    for (const [d, n] of dirFileCount) if (d === dir || d.startsWith(dir === "" ? "" : dir + "/")) c += n;
    subtreeCount.set(dir, c);
  }
  // A shown-dir is "collapsed" (drillable) if any file under it lives deeper than shown.
  const drillable = new Set();
  for (const { f, srel } of inScope) {
    const relDir = dirOf(srel);
    const segs = relDir === "" ? [] : relDir.split("/");
    if (segs.length > MAX_DEPTH) drillable.add(segs.slice(0, MAX_DEPTH).join("/"));
  }

  const hubNodes = [...allDirs].filter(dir => dir != null).map(dir => {
    const branch = dir === "" ? "(root)" : dir.split("/")[0];
    const canDrill = drillable.has(dir);
    return { id: "dir:" + dir, kind: "dir", dir, branch, color: dirColor(scope + "/" + branch),
             label: dir === "" ? (scope.split("/").pop() || folder) : dir.split("/").pop(),
             depth: dir === "" ? 0 : dir.split("/").length,
             drillTo: (subpath ? subpath + "/" : "") + dir, canDrill,
             size: 10 + Math.min(28, Math.sqrt(subtreeCount.get(dir) || 1) * 2.4),
             file_count: subtreeCount.get(dir) };
  });
  const nodes = hubNodes.concat(fileNodes);

  const treeLinks = [];
  for (const dir of allDirs) {
    const p = parentDir(dir);
    if (p !== null) treeLinks.push({ source: "dir:" + p, target: "dir:" + dir, weight: 1, kind: "hub" });
  }
  fileNodes.forEach(f => treeLinks.push({ source: "dir:" + collapsedInto.get(f.id), target: f.id, weight: 1, kind: "hub" }));

  const shown = new Set(fileNodes.map(f => f.id));
  let violations = 0;
  // Dependency edges reference file_path; map to node ids, keep only in-scope,
  // classify each as a layering violation (import outside its own subtree).
  const byPath = new Map(data.files.map(f => [f.file_path, f.id]));
  const deps = (data.edges || [])
    .map(e => ({ s: byPath.get(e.source), t: byPath.get(e.target), w: e.weight }))
    .filter(e => shown.has(e.s) && shown.has(e.t))
    .map(e => {
      const dA = fileDir.get(e.s), dB = fileDir.get(e.t);
      const viol = isViolation(dA, dB);
      if (viol) violations++;
      return { source: e.s, target: e.t, weight: e.w, kind: "dep",
               violation: viol, dist: treeDistance(dA, dB) };
    });
  render(nodes, treeLinks.concat(deps));

  const orphans = fileNodes.length - new Set(deps.flatMap(e => [e.source, e.target])).size;
  const deeper = drillable.size ? ` · ${drillable.size} dirs collapsed (click to drill)` : "";
  document.getElementById("note").textContent =
    `${fileNodes.length} files · ${allDirs.size - 1} directories · ${violations} layering violations · ${orphans} unwired${deeper}.`;
}

function row(cls, text) { const d = document.createElement("div"); d.className = cls; d.textContent = text; return d; }

function showDetail(d) {
  // textContent everywhere: labels/paths come from on-disk file names — treat as untrusted.
  const el = document.getElementById("detail");
  el.replaceChildren();
  el.appendChild(row("sel-title", d.kind === "dir" ? d.label + "/" : d.label));
  if (d.kind === "dir") {
    el.appendChild(row("stat", `${d.file_count} files in this directory`));
  } else {
    el.appendChild(row("stat", d.kind === "folder" ? `${d.file_count} files` : (d.path || "")));
    el.appendChild(row("stat", `${d.diag || 0} diagnostics${d.worst ? " · worst: " + d.worst : ""}`));
  }
}

function crumbs() {
  const c = document.getElementById("crumbs");
  c.replaceChildren();
  const crumb = (text, onclick) => {
    const a = document.createElement("a");
    a.textContent = text; a.onclick = onclick; return a;
  };
  const sep = () => document.createTextNode(" ▸ ");
  const repo = state.repoRoot ? (state.repoRoot.split("/").pop() || state.repoRoot) : "";
  c.appendChild(crumb(repo, showFolders));
  if (state.folder) {
    c.appendChild(sep());
    c.appendChild(crumb(state.folder, () => drillTo("")));   // folder root
    // each drilled sub-directory segment is its own clickable crumb
    if (state.subpath) {
      const segs = state.subpath.split("/");
      let acc = "";
      segs.forEach(seg => {
        acc = acc ? acc + "/" + seg : seg;
        const path = acc;
        c.appendChild(sep());
        c.appendChild(crumb(seg, () => drillTo(path)));
      });
    }
  }
}

function showEmpty(msg) {
  svg.selectAll("*").remove();
  const s = document.getElementById("stage");
  let e = document.getElementById("empty");
  if (!e) { e = document.createElement("div"); e.id = "empty"; s.appendChild(e); }
  e.textContent = msg;
}

function resetView() {
  // Re-frame the current view (fit all nodes); does NOT navigate away.
  if (state.fitView) state.fitView(400);
  else if (state.zoom) svg.transition().duration(300).call(state.zoom.transform, d3.zoomIdentity);
}

// Re-render whatever view is active (after a mode/label toggle).
function refresh() { state.folder ? renderScope() : showFolders(); }

document.getElementById("reset").onclick = resetView;
document.getElementById("mode").onclick = (e) => {
  state.mode = state.mode === "soft" ? "rigid" : "soft";
  e.target.textContent = state.mode === "soft" ? "Soft coupling" : "Rigid structure";
  refresh();
};
document.getElementById("labels").onclick = (e) => {
  state.labelMode = state.labelMode === "auto" ? "on"
                  : state.labelMode === "on" ? "off" : "auto";
  e.target.textContent = "Names: " + state.labelMode;
  refresh();
};
loadRepos().catch(e => showEmpty(e.message));
</script>
</body>
</html>
